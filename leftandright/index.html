<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Left and Right Identification</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f7f9ff;
overflow:hidden;
text-align:center;
}

.screen{
width:100vw;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.logo{
width:180px;
margin-bottom:20px;
}

h1{
color:#1d4ed8;
margin-bottom:15px;
}

.btn{
padding:15px 35px;
font-size:22px;
border:none;
border-radius:15px;
background:#2563eb;
color:white;
cursor:pointer;
}

.btn:hover{
transform:scale(1.05);
}

.hidden{
display:none !important;
}

.game-area{
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.score{
position:absolute;
top:15px;
right:20px;
font-size:28px;
font-weight:bold;
color:#2563eb;
}

.instruction{
font-size:42px;
font-weight:bold;
margin-bottom:50px;
color:#111827;
}

.tap-container{
display:flex;
width:100%;
justify-content:space-evenly;
align-items:center;
}

.side{
width:250px;
height:250px;
border-radius:30px;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
font-weight:bold;
cursor:pointer;
transition:.3s;
user-select:none;
}

.side:hover{
transform:scale(1.05);
}

.left{
background:#93c5fd;
}

.right{
background:#fca5a5;
}

.feedback{
font-size:45px;
margin-top:40px;
height:60px;
font-weight:bold;
}

.correct{
color:green;
}

.wrong{
color:red;
}

.celebrate{
font-size:80px;
animation:bounce 1s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-20px);}
}
</style>
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen" class="screen">

<img src="assets/innovinelogo.png"
class="logo"
onerror="this.style.display='none'">

<h1>Left and Right</h1>

<button class="btn" onclick="startGame()">
Start Game
</button>

</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen hidden">

<div class="score">
⭐ Score: <span id="score">0</span>
</div>

<div class="game-area">

<div class="instruction" id="instruction">
Tap LEFT
</div>

<div class="tap-container">

<div class="side left"
onclick="checkAnswer('left')">
LEFT
</div>

<div class="side right"
onclick="checkAnswer('right')">
RIGHT
</div>

</div>

<div class="feedback" id="feedback"></div>

</div>

</div>

<!-- CELEBRATION SCREEN -->
<div id="endScreen" class="screen hidden">

<div class="celebrate">
🎉🎉🎉
</div>

<h1>Great Job!</h1>

<h2 id="finalScore"></h2>

<br>

<button class="btn" onclick="restartGame()">
Play Again
</button>

</div>

<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>
<audio id="clapSound" src="assets/clap.mp3"></audio>

<script>

let score = 0;
let round = 0;
let totalRounds = 10;

let currentAnswer = "";

const instructions = [
"Tap LEFT",
"Tap RIGHT"
];

function speak(text){

if('speechSynthesis' in window){

speechSynthesis.cancel();

let utterance = new SpeechSynthesisUtterance(text);
utterance.rate = 0.9;
utterance.pitch = 1.1;

speechSynthesis.speak(utterance);

}
}

function startGame(){

document.getElementById("startScreen").classList.add("hidden");
document.getElementById("gameScreen").classList.remove("hidden");

nextRound();

}

function nextRound(){

if(round >= totalRounds){
finishGame();
return;
}

round++;

const instruction =
instructions[Math.floor(Math.random()*2)];

document.getElementById("instruction").innerText =
instruction;

currentAnswer =
instruction.includes("LEFT")
? "left"
: "right";

document.getElementById("feedback").innerHTML="";

speak(instruction);

}

function checkAnswer(choice){

if(choice===currentAnswer){

score++;

document.getElementById("score").innerText=score;

document.getElementById("feedback").innerHTML=
"<span class='correct'>✔ Correct!</span>";

document.getElementById("correctSound").play();

}else{

document.getElementById("feedback").innerHTML=
"<span class='wrong'>✖ Try Again!</span>";

document.getElementById("wrongSound").play();

}

setTimeout(()=>{
nextRound();
},1200);

}

function finishGame(){

document.getElementById("gameScreen").classList.add("hidden");

document.getElementById("endScreen").classList.remove("hidden");

document.getElementById("finalScore").innerHTML =
"Your Score: " + score + " / " + totalRounds;

document.getElementById("clapSound").play();

speak("Great Job");

}

function restartGame(){

score=0;
round=0;

document.getElementById("score").innerText="0";

document.getElementById("endScreen").classList.add("hidden");

document.getElementById("gameScreen").classList.remove("hidden");

nextRound();

}

</script>

</body>
</html>
